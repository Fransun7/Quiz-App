<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Boldonse&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Miranda+Sans:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Saira+Stencil:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <h1 id="quiz-app" class="quiz-app-color">Quiz App</h1>
      <div id="quiz-container">
        <div id="question-container" class="hidden">
          <p id="question-no"></p>
          <h2 id="question-text"></h2>
          <ul id="choices-list">
            <!-- Choices will be added dynamically here -->
          </ul>

          <!-- Navigators -->
          <div id="navigator" class="hidden">
            <div class="button-container">
              <button id="prev-btn" class="button-3d">
                <div class="button-top">
                  <span class="material-icons">❮</span>
                </div>
                <div class="button-bottom"></div>
                <div class="button-base"></div>
              </button>
              <button id="next-btn" class="button-3d">
                <div class="button-top">
                  <span class="material-icons">❯</span>
                </div>
                <div class="button-bottom"></div>
                <div class="button-base"></div>
              </button>
            </div>
          </div>

          <div id="quiz-status"></div>
          <button id="score-btn" class="hidden">Check Score</button>
        </div>
        <div id="result-container" class="hidden">
          <h2>Your Score:</h2>
          <p id="score"></p>
          <button id="review">Review Answers</button>
          <button id="restart-btn1">Restart Quiz</button>
        </div>

        <div id="first-container">
          <a id="start-btn" class="codepen-button"><span>Start Quiz</span></a>
          <button id="menu-btn" class="hidden">Menu</button>
        </div>
      </div>

      <div id="review-container" class="hidden">
        <div id="review-navigator">
          <button id="review-prev-btn">Previous</button>
          <button id="restart-btn2">Restart</button>
          <button id="review-next-btn">Next</button>
        </div>
      </div>

      <div id="menu-container" class="hidden">
        <div id="subject-buttons">
          <button id="biology-btn">
            Biology <i id="biology-icon" class="fa-solid fa-chevron-right"></i>
          </button>
          <button id="chemistry-btn">
            Chemistry
            <i id="chemistry-icon" class="fa-solid fa-chevron-right"></i>
          </button>
          <button id="physics-btn">
            Physics
            <span
              ><i id="physics-icon" class="fa-solid fa-chevron-right"></i
            ></span>
          </button>
        </div>
        <div id="dropdown-list" class="hidden"></div>

        <button id="menu-btn2" class="hidden">Menu</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
